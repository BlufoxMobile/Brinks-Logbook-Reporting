<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monday Ops — Submission Tracker</title>
<style>
  :root {
    --bg: #000;
    --fg: #ffffff;
    --muted: #b8b8b8;
    --accent: #ff5a1f;
    --border: #2a2a2a;
    --card-bg: #0c0c0c;
    --card-bg-hover: #161616;
    --success: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* --- Site-level tab strip (shared with Brinks index.html) --- */
  .bx-tabs {
    position: sticky;
    top: 0;
    z-index: 200;
    background: #000;
    border-bottom: 1px solid #2a2a2a;
    width: 100%;
  }
  .bx-tabs-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .bx-tab {
    padding: 14px 18px;
    color: #b8b8b8;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  .bx-tab:hover { color: #ffffff; }
  .bx-tab.active {
    color: #ff5a1f;
    border-bottom-color: #ff5a1f;
  }
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }
  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  header.top h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
  }
  header.top h1 small {
    display: block;
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
    margin-top: 4px;
  }
  .btns { display: flex; gap: 10px; }
  button, .btn {
    padding: 10px 14px;
    background: var(--card-bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  button:hover, .btn:hover { background: var(--card-bg-hover); border-color: #444; }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  button.primary:hover { opacity: 0.92; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .toolbar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .toolbar label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .toolbar input, .toolbar select {
    width: 100%;
    padding: 10px 12px;
    background: var(--card-bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  .toolbar input:focus, .toolbar select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 18px;
  }
  .stat {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat .num { font-size: 24px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .stat.success .num { color: var(--success); }
  .stat.warn .num { color: var(--warn); }
  .stat.danger .num { color: var(--danger); }

  table.subs {
    width: 100%;
    border-collapse: collapse;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    font-size: 14px;
  }
  table.subs th, table.subs td {
    text-align: left;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  table.subs th {
    background: #0a0a0a;
    font-weight: 700;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  table.subs th:hover { color: var(--fg); }
  table.subs tr.row { cursor: pointer; transition: background 0.1s; }
  table.subs tr.row:hover { background: var(--card-bg-hover); }
  table.subs tr:last-child td { border-bottom: none; }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .pill.yes  { background: rgba(34, 197, 94, 0.15);  color: var(--success); }
  .pill.no   { background: rgba(239, 68, 68, 0.15);  color: var(--danger); }
  .pill.dot  { padding: 2px 6px; font-size: 9px; }

  .empty {
    background: var(--card-bg);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  /* Detail modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 50;
    display: none;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 40px 16px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 760px;
    padding: 24px;
  }
  .modal header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    padding-bottom: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .modal h2 { margin: 0; font-size: 20px; }
  .modal h2 small { display: block; color: var(--muted); font-weight: 400; font-size: 13px; margin-top: 2px; }
  .modal .close {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 10px;
  }
  .modal .close:hover { color: var(--fg); }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;
    margin-bottom: 16px;
  }
  .detail-grid .item .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 2px; }
  .detail-grid .item .val { font-size: 14px; }
  .answers-list {
    background: #050505;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .answers-list div {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #161616;
    font-size: 14px;
  }
  .answers-list div:last-child { border: none; }
  .answers-list .a-lbl { color: var(--muted); }
  .photos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .photos figure { margin: 0; }
  .photos figcaption { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 700; }
  .photos img {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: zoom-in;
  }
  .notes-block {
    background: #050505;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 14px;
    white-space: pre-wrap;
    color: var(--fg);
  }
  .notes-block.empty-state { color: var(--muted); font-style: italic; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    cursor: zoom-out;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 6px; }

  .status-banner {
    padding: 12px 16px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--danger);
    border-radius: 8px;
    color: var(--danger);
    margin-bottom: 18px;
    font-size: 14px;
  }
  .status-banner.info { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--muted); }

  @media (max-width: 820px) {
    .toolbar { grid-template-columns: 1fr 1fr; }
    .stats { grid-template-columns: 1fr 1fr; }
    .detail-grid, .photos { grid-template-columns: 1fr; }
    table.subs th.hide-sm, table.subs td.hide-sm { display: none; }
  }
</style>
</head>
<body>
<nav class="bx-tabs" aria-label="Reports">
  <div class="bx-tabs-inner">
    <a class="bx-tab" href="index.html">🚚 Brinks Pickup Log</a>
    <a class="bx-tab active" href="monday-ops.html" aria-current="page">📋 Monday Ops Tracker</a>
  </div>
</nav>
<div class="container">
  <header class="top">
    <h1>Monday Ops — Submission Tracker
      <small id="lastRefreshed">Loading…</small>
    </h1>
    <div class="btns">
      <button id="refreshBtn">↻ Refresh</button>
      <button id="uploadBtn">⬆ Import JSON</button>
      <input type="file" id="uploadInput" accept="application/json,.json" multiple style="display:none">
      <button id="exportBtn">⬇ Export CSV</button>
      <a class="btn" href="monday-ops-checklist.html" target="_blank" rel="noopener">+ New Submission</a>
    </div>
  </header>

  <div id="banner" class="status-banner info" style="display:none"></div>

  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">Submissions</div></div>
    <div class="stat success"><div class="num" id="statAllYes">0</div><div class="lbl">All-Yes</div></div>
    <div class="stat warn"><div class="num" id="statSomeNo">0</div><div class="lbl">Has a No</div></div>
    <div class="stat"><div class="num" id="statStores">0</div><div class="lbl">Unique Stores</div></div>
  </div>

  <div class="toolbar">
    <div>
      <label for="filterDate">Date</label>
      <input type="date" id="filterDate">
    </div>
    <div>
      <label for="filterStore">Store</label>
      <select id="filterStore"><option value="">All stores</option></select>
    </div>
    <div>
      <label for="filterDm">DM</label>
      <select id="filterDm">
        <option value="">All DMs</option>
        <option>Imaad</option>
        <option>Juan</option>
        <option>Jacob</option>
      </select>
    </div>
    <div>
      <label for="filterStatus">Status</label>
      <select id="filterStatus">
        <option value="">All</option>
        <option value="all-yes">All-Yes only</option>
        <option value="has-no">Has any No</option>
      </select>
    </div>
  </div>

  <div id="tableWrap"></div>
</div>

<!-- Detail modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

<script>
  /* ============================================================
   * CONFIGURATION — must match the form's settings
   * ============================================================ */
  const CONFIG = {
    GITHUB_OWNER: "blufoxmobile",
    GITHUB_REPO: "Daily-Sales-Report",
    GITHUB_BRANCH: "main",
    SUBMISSIONS_DIR: "data/monday-ops-submissions",

    // Optional. Only needed if the repo is private. Read-only fine-grained PAT recommended.
    GITHUB_TOKEN: ""
  };
  /* ============================================================ */

  const $ = id => document.getElementById(id);
  let SUBMISSIONS = [];
  let SORT = { key: "date", dir: "desc" };

  // Photo labels — preferred display order. Legacy keys still render if present.
  const PHOTO_LABELS = {
    week1:     "Schedules — Week 1",
    week2:     "Schedules — Week 2",
    week3:     "Schedules — Week 3",
    week4:     "Schedules — Week 4",
    upgrades:  "Empty Upgrades Bucket (XInventory)",
    tradeins:  "Empty Trade-Ins / Returns Bucket (XInventory)",
    brinks:    "Brinks Deposit Logs",
    facility1: "Facilities Issue — Photo 1",
    facility2: "Facilities Issue — Photo 2",
    facility3: "Facilities Issue — Photo 3",
    facility4: "Facilities Issue — Photo 4",
    safe:      "Inside of Safe (legacy)"
  };

  function renderPhotos(photos) {
    if (!photos || typeof photos !== "object") return "";
    const ordered = Object.keys(PHOTO_LABELS).filter(k => photos[k]);
    const extras  = Object.keys(photos).filter(k => !PHOTO_LABELS[k] && photos[k]);
    const all = [...ordered, ...extras];
    if (!all.length) return '<div style="color:var(--muted);font-size:13px">No photos attached.</div>';
    return all.map(k => {
      const label = PHOTO_LABELS[k] || k;
      return `<figure><figcaption>${escapeHtml(label)}</figcaption><img src="${photos[k]}" alt="${escapeHtml(label)}"></figure>`;
    }).join("");
  }

  function ghHeaders() {
    const h = { Accept: "application/vnd.github+json" };
    if (CONFIG.GITHUB_TOKEN) h.Authorization = "token " + CONFIG.GITHUB_TOKEN;
    return h;
  }

  async function fetchListing() {
    const url = `https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/contents/${CONFIG.SUBMISSIONS_DIR}?ref=${encodeURIComponent(CONFIG.GITHUB_BRANCH)}`;
    const res = await fetch(url, { headers: ghHeaders(), cache: "no-store" });
    if (res.status === 404) return [];
    if (!res.ok) throw new Error(`GitHub list ${res.status}`);
    const items = await res.json();
    return items.filter(it => it.type === "file" && it.name.endsWith(".json"));
  }

  async function fetchSubmission(file) {
    // download_url is the raw URL for the file at this ref
    const res = await fetch(file.download_url, { cache: "no-store" });
    if (!res.ok) throw new Error(`Fetch ${file.name} → ${res.status}`);
    return res.json();
  }

  async function loadAll() {
    setBanner("info", "Loading submissions from GitHub…");
    try {
      const files = await fetchListing();
      const subs = await Promise.all(files.map(async f => {
        try {
          const data = await fetchSubmission(f);
          return { ...data, _filename: f.name, _path: f.path };
        } catch (e) {
          console.warn("Failed:", f.name, e);
          return null;
        }
      }));
      SUBMISSIONS = subs.filter(Boolean);
      $("lastRefreshed").textContent = `Last refreshed ${new Date().toLocaleString()} · ${SUBMISSIONS.length} submission${SUBMISSIONS.length === 1 ? "" : "s"}`;
      setBanner(null);
    } catch (err) {
      console.error(err);
      setBanner("error", `Couldn't load from GitHub: ${err.message}. You can still drop JSON files via "Import JSON".`);
      $("lastRefreshed").textContent = "Loaded from local imports only";
    }
    render();
  }

  function setBanner(type, msg) {
    const b = $("banner");
    if (!type) { b.style.display = "none"; return; }
    b.style.display = "block";
    b.className = "status-banner " + (type === "error" ? "" : "info");
    b.textContent = msg;
  }

  // --- Filtering / sorting / rendering ---
  function filtered() {
    const f = {
      date: $("filterDate").value,
      store: $("filterStore").value,
      dm: $("filterDm").value,
      status: $("filterStatus").value
    };
    return SUBMISSIONS.filter(s => {
      if (f.date && s.date !== f.date) return false;
      if (f.store && s.store !== f.store) return false;
      if (f.dm && s.dm !== f.dm) return false;
      if (f.status) {
        const all = allYes(s);
        if (f.status === "all-yes" && !all) return false;
        if (f.status === "has-no" && all) return false;
      }
      return true;
    }).sort(sortFn);
  }

  function allYes(s) {
    const a = s.answers || {};
    return ["depositBags","pciChecklist","scheduleWeeks","cashFloat","returnsShipped"]
      .every(k => a[k] === "Yes");
  }

  function sortFn(a, b) {
    const k = SORT.key;
    let av = a[k], bv = b[k];
    if (k === "submittedAt" || k === "date") {
      av = new Date(av || 0).getTime(); bv = new Date(bv || 0).getTime();
    } else {
      av = (av || "").toString().toLowerCase();
      bv = (bv || "").toString().toLowerCase();
    }
    if (av < bv) return SORT.dir === "asc" ? -1 : 1;
    if (av > bv) return SORT.dir === "asc" ? 1 : -1;
    return 0;
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
  }

  function render() {
    const list = filtered();

    // Stats (use full list, not just filtered)
    $("statTotal").textContent = SUBMISSIONS.length;
    $("statAllYes").textContent = SUBMISSIONS.filter(allYes).length;
    $("statSomeNo").textContent = SUBMISSIONS.filter(s => !allYes(s)).length;
    $("statStores").textContent = new Set(SUBMISSIONS.map(s => s.store).filter(Boolean)).size;

    // Populate store filter
    const storeSel = $("filterStore");
    const currentStore = storeSel.value;
    const stores = [...new Set(SUBMISSIONS.map(s => s.store).filter(Boolean))].sort();
    storeSel.innerHTML = '<option value="">All stores</option>' + stores.map(s => `<option ${s === currentStore ? "selected" : ""}>${escapeHtml(s)}</option>`).join("");

    const wrap = $("tableWrap");
    if (!list.length) {
      wrap.innerHTML = `<div class="empty">${SUBMISSIONS.length ? "No submissions match your filters." : "No submissions yet. New ones will appear here once managers submit the form."}</div>`;
      return;
    }

    const headers = [
      ["date", "Date", ""],
      ["store", "Store", ""],
      ["name", "Manager", ""],
      ["dm", "DM", ""],
      ["_answers", "Answers", "hide-sm"],
      ["_status", "Status", ""],
      ["submittedAt", "Submitted", "hide-sm"]
    ];

    wrap.innerHTML = `
      <table class="subs">
        <thead><tr>${headers.map(([k, lbl, cls]) =>
          `<th class="${cls}" data-sort="${k}">${escapeHtml(lbl)}${SORT.key === k ? (SORT.dir === "asc" ? " ▲" : " ▼") : ""}</th>`).join("")}</tr></thead>
        <tbody>${list.map((s, i) => rowHtml(s, i)).join("")}</tbody>
      </table>`;

    wrap.querySelectorAll("th[data-sort]").forEach(th => {
      th.addEventListener("click", () => {
        const k = th.dataset.sort;
        if (k.startsWith("_")) return;
        if (SORT.key === k) SORT.dir = SORT.dir === "asc" ? "desc" : "asc";
        else { SORT.key = k; SORT.dir = "asc"; }
        render();
      });
    });
    wrap.querySelectorAll("tr.row").forEach(tr => {
      tr.addEventListener("click", () => openDetail(parseInt(tr.dataset.idx)));
    });
  }

  function rowHtml(s, idx) {
    const a = s.answers || {};
    const yesCount = ["depositBags","pciChecklist","scheduleWeeks","cashFloat","returnsShipped"].filter(k => a[k] === "Yes").length;
    const status = yesCount === 5
      ? '<span class="pill yes">All Yes</span>'
      : `<span class="pill no">${5 - yesCount} No</span>`;
    const dots = ["depositBags","pciChecklist","scheduleWeeks","cashFloat","returnsShipped"]
      .map(k => `<span class="pill dot ${a[k] === "Yes" ? "yes" : "no"}" title="${k}">${a[k] === "Yes" ? "✓" : "✕"}</span>`).join(" ");
    const submitted = s.submittedAt ? new Date(s.submittedAt).toLocaleString([], { dateStyle: "short", timeStyle: "short" }) : "";
    // Note: list filtering uses SUBMISSIONS order, but openDetail expects same index. Pass the unique key instead.
    return `<tr class="row" data-idx="${SUBMISSIONS.indexOf(s)}">
      <td>${escapeHtml(s.date || "")}</td>
      <td>${escapeHtml(s.store || "")}</td>
      <td>${escapeHtml(s.name || "")}</td>
      <td>${escapeHtml(s.dm || "")}</td>
      <td class="hide-sm">${dots}</td>
      <td>${status}</td>
      <td class="hide-sm">${escapeHtml(submitted)}</td>
    </tr>`;
  }

  // --- Detail modal ---
  function openDetail(idx) {
    const s = SUBMISSIONS[idx];
    if (!s) return;
    const a = s.answers || {};
    const photos = s.photos || {};
    const submitted = s.submittedAt ? new Date(s.submittedAt).toLocaleString() : "—";
    const answersLabels = {
      depositBags:    "Two months of deposit bags & slips",
      pciChecklist:   "PCI Checklist complete",
      scheduleWeeks:  "4 weeks of schedules in Shiftlabs",
      cashFloat:      "Cash Float Tracker complete",
      returnsShipped: "Returns & trade-ins shipped"
    };

    $("modalContent").innerHTML = `
      <header>
        <h2>${escapeHtml(s.store || "Unknown store")}
          <small>${escapeHtml(s.date || "")} · Submitted ${escapeHtml(submitted)}</small>
        </h2>
        <button class="close" id="closeModal" aria-label="Close">×</button>
      </header>

      <div class="detail-grid">
        <div class="item"><div class="lbl">Manager</div><div class="val">${escapeHtml(s.name || "—")}</div></div>
        <div class="item"><div class="lbl">Manager Email</div><div class="val">${escapeHtml(s.email || "—")}</div></div>
        <div class="item"><div class="lbl">DM</div><div class="val">${escapeHtml(s.dm || "—")}</div></div>
        <div class="item"><div class="lbl">DM Email</div><div class="val">${escapeHtml(s.dmEmail || "—")}</div></div>
      </div>

      <div class="answers-list">
        ${Object.entries(answersLabels).map(([k, lbl]) => {
          const v = a[k];
          return `<div><span class="a-lbl">${escapeHtml(lbl)}</span>
            <span class="pill ${v === "Yes" ? "yes" : "no"}">${escapeHtml(v || "—")}</span></div>`;
        }).join("")}
      </div>

      <div class="photos">
        ${renderPhotos(photos)}
      </div>

      <div class="${s.notes ? "notes-block" : "notes-block empty-state"}">${escapeHtml(s.notes || "No facilities or ops notes left.")}</div>

      <div class="modal-actions">
        <button id="emailMgr">✉ Email Manager</button>
        <button id="emailDm">✉ Email DM</button>
        <button id="downloadJson">⬇ Download JSON</button>
        <button class="primary" id="closeModal2">Close</button>
      </div>
    `;
    $("modalBackdrop").classList.add("show");

    const close = () => $("modalBackdrop").classList.remove("show");
    $("closeModal").onclick = close;
    $("closeModal2").onclick = close;
    $("modalBackdrop").onclick = e => { if (e.target === $("modalBackdrop")) close(); };

    $("emailMgr").onclick = () => {
      if (s.email) window.location.href = `mailto:${s.email}?subject=${encodeURIComponent("Monday Ops Checklist — " + (s.store || "") + " " + (s.date || ""))}`;
    };
    $("emailDm").onclick = () => {
      if (s.dmEmail) window.location.href = `mailto:${s.dmEmail}?subject=${encodeURIComponent("Monday Ops Checklist — " + (s.store || "") + " " + (s.date || ""))}`;
    };
    $("downloadJson").onclick = () => {
      const blob = new Blob([JSON.stringify(s, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = s._filename || `${s.date || "submission"}-${(s.store || "").toLowerCase().replace(/[^a-z0-9]+/g, "-")}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    };

    // Lightbox for photos
    document.querySelectorAll(".photos img").forEach(img => {
      img.addEventListener("click", () => {
        $("lightboxImg").src = img.src;
        $("lightbox").classList.add("show");
      });
    });
  }

  $("lightbox").addEventListener("click", () => $("lightbox").classList.remove("show"));

  // --- Filters ---
  ["filterDate","filterStore","filterDm","filterStatus"].forEach(id => {
    $(id).addEventListener("change", render);
  });

  // --- Refresh, import, export ---
  $("refreshBtn").onclick = loadAll;

  $("uploadBtn").onclick = () => $("uploadInput").click();
  $("uploadInput").addEventListener("change", async e => {
    const files = Array.from(e.target.files || []);
    for (const f of files) {
      try {
        const txt = await f.text();
        const json = JSON.parse(txt);
        json._filename = f.name;
        json._path = "(local import)";
        // De-dupe: replace any existing with same store+date
        const idx = SUBMISSIONS.findIndex(s => s.store === json.store && s.date === json.date);
        if (idx >= 0) SUBMISSIONS[idx] = json;
        else SUBMISSIONS.push(json);
      } catch (err) {
        console.warn("Couldn't parse", f.name, err);
      }
    }
    e.target.value = "";
    render();
  });

  $("exportBtn").onclick = () => {
    const list = filtered();
    if (!list.length) return;
    const rows = [
      ["Date","Store","Manager","Manager Email","DM","DM Email","Deposit Bags","PCI Checklist","Schedule Weeks","Cash Float","Returns Shipped","Notes","Submitted At"]
    ];
    for (const s of list) {
      const a = s.answers || {};
      rows.push([
        s.date || "", s.store || "", s.name || "", s.email || "", s.dm || "", s.dmEmail || "",
        a.depositBags || "", a.pciChecklist || "", a.scheduleWeeks || "", a.cashFloat || "", a.returnsShipped || "",
        (s.notes || "").replace(/\n/g, " "), s.submittedAt || ""
      ]);
    }
    const csv = rows.map(r => r.map(c => {
      const t = String(c);
      return /[",\n]/.test(t) ? `"${t.replace(/"/g, '""')}"` : t;
    }).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `monday-ops-submissions-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // Initial load
  loadAll();
</script>
</body>
</html>
