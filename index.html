<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uniform Orders</title>
<style>
  :root {
    --bg: #000000;
    --surface: #0e0e0e;
    --surface-2: #1a1a1a;
    --surface-3: #242424;
    --border: #2a2a2a;
    --border-strong: #3a3a3a;
    --text: #ffffff;
    --text-dim: #8a8a8a;
    --text-faint: #555555;
    --positive: #4ade80;
    --warning: #fbbf24;
    --error: #ef4444;
    --accent: #ff5a1f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    font-size: 15px; line-height: 1.45;
    -webkit-text-size-adjust: 100%;
  }

  /* Tabs */
  .bx-tabs { position: sticky; top: 0; z-index: 200; background: #000; border-bottom: 1px solid #2a2a2a; }
  .bx-tabs-inner { max-width: 1280px; margin: 0 auto; padding: 0 16px; display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .bx-tab { padding: 14px 18px; color: #b8b8b8; text-decoration: none; font-weight: 600; font-size: 14px; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
  .bx-tab:hover { color: #fff; }
  .bx-tab.active { color: #ff5a1f; border-bottom-color: #ff5a1f; }

  /* Header */
  header.site { border-bottom: 1px solid var(--border); }
  .head-inner { max-width: 1280px; margin: 0 auto; padding: 18px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .brand-logo { width: 40px; height: 40px; border-radius: 10px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--border); }
  .head-title h1 { margin: 0; font-size: 20px; letter-spacing: -0.01em; }
  .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .head-status { margin-left: auto; font-size: 12px; color: var(--text-dim); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); }
  .status-dot.ok { background: var(--positive); }
  .status-dot.err { background: var(--error); }
  .status-dot.load { background: var(--warning); }
  .refresh-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim); border-radius: 7px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .refresh-btn:hover { color: #fff; border-color: var(--border-strong); }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 18px 16px 80px; }

  /* Summary cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .metric .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); }
  .metric .value { font-size: 28px; font-weight: 800; margin-top: 6px; letter-spacing: -0.02em; }
  .metric .sub { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
  .metric.pending .value { color: var(--warning); }
  .metric.shipped .value { color: var(--positive); }

  /* Controls */
  .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .segmented { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
  .segmented button { background: none; border: none; color: var(--text-dim); padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 7px; cursor: pointer; font-family: inherit; }
  .segmented button.active { background: var(--surface-3); color: #fff; }
  .segmented button .pill { display: inline-block; min-width: 18px; margin-left: 6px; padding: 1px 6px; font-size: 11px; border-radius: 10px; background: var(--surface-2); color: var(--text-dim); }
  .segmented button.active .pill { background: var(--accent); color: #fff; }
  .search { flex: 1; min-width: 180px; }
  .search input { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px; font-family: inherit; }
  .search input:focus { outline: none; border-color: var(--border-strong); }

  /* Order cards */
  .orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
  .order { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .order-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; }
  .order-head .store { font-size: 17px; font-weight: 700; }
  .order-head .date { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .badge { margin-left: auto; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .badge.pending { background: rgba(251,191,36,0.15); color: var(--warning); border: 1px solid rgba(251,191,36,0.35); }
  .badge.shipped { background: rgba(74,222,128,0.15); color: var(--positive); border: 1px solid rgba(74,222,128,0.35); }

  .order-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; flex: 1; }
  .field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-faint); margin-bottom: 4px; }
  .ship-to { font-size: 13px; color: var(--text-dim); white-space: pre-line; }

  table.items { width: 100%; border-collapse: collapse; }
  table.items th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); padding: 4px 8px; border-bottom: 1px solid var(--border); }
  table.items td { padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
  table.items tr:last-child td { border-bottom: none; }
  table.items .sz { font-weight: 700; color: #fff; width: 52px; }
  table.items .qty { font-weight: 700; color: var(--accent); text-align: center; width: 44px; }
  table.items .rec { color: var(--text-dim); }

  .total-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 700; padding-top: 4px; }
  .total-row .n { font-size: 18px; color: var(--accent); }

  /* Shipped info block */
  .shipped-info { background: rgba(74,222,128,0.06); border: 1px solid rgba(74,222,128,0.25); border-radius: 10px; padding: 12px 14px; }
  .shipped-info .row { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; padding: 3px 0; }
  .shipped-info .row .k { color: var(--text-dim); }
  .shipped-info .row .v { font-weight: 600; text-align: right; word-break: break-word; }
  .track-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; background: var(--positive); color: #04210f; text-decoration: none; font-weight: 700; font-size: 13px; padding: 9px 16px; border-radius: 8px; }
  .track-link:hover { filter: brightness(1.08); }

  /* Ship action */
  .order-foot { padding: 12px 16px; border-top: 1px solid var(--border); }
  .ship-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .ship-btn:hover { filter: brightness(1.05); }
  .ship-btn:disabled { background: var(--surface-3); color: var(--text-faint); cursor: not-allowed; }

  .ship-form { display: none; flex-direction: column; gap: 10px; }
  .ship-form.open { display: flex; }
  .ship-form label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 4px; display: block; }
  .ship-form select, .ship-form input { width: 100%; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 15px; font-family: inherit; appearance: none; }
  .ship-form select:focus, .ship-form input:focus { outline: none; border-color: var(--accent); }
  .ship-form .two { display: flex; gap: 10px; }
  .ship-form .two > div { flex: 1; }
  .ship-actions { display: flex; gap: 10px; }
  .ship-actions button { flex: 1; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; border: 1px solid var(--border); }
  .btn-confirm { background: var(--positive); color: #04210f; border-color: transparent; }
  .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { background: transparent; color: var(--text-dim); }
  .ship-err { font-size: 12px; color: var(--error); display: none; }
  .ship-err.show { display: block; }

  /* States */
  .state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .state .big { font-size: 32px; margin-bottom: 10px; }
  .spinner { width: 26px; height: 26px; border: 3px solid var(--surface-3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); background: var(--surface-2); border: 1px solid var(--border-strong); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 400; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--positive); }
  .toast.error { border-color: var(--error); }

  @media (max-width: 480px) {
    .orders { grid-template-columns: 1fr; }
    .head-status { width: 100%; margin-left: 0; }
  }
</style>
</head>
<body>

<nav class="bx-tabs" aria-label="Reports">
  <div class="bx-tabs-inner">
    <a class="bx-tab" href="index.html">🚚 Brinks Pickup Log</a>
    <a class="bx-tab" href="monday-ops.html">📋 Monday Ops Tracker</a>
    <a class="bx-tab" href="tuesday-phone-tracker.html">📞 Tuesday Phone Counts</a>
    <a class="bx-tab" href="wednesday-cpe-tracker.html">📱 Wednesday CPE Counts</a>
    <a class="bx-tab active" href="uniform-orders.html" aria-current="page">📦 Uniform Orders</a>
  </div>
</nav>

<header class="site">
  <div class="head-inner">
    <div class="brand-logo" aria-hidden="true">📦</div>
    <div class="head-title">
      <h1>Uniform Orders</h1>
      <div class="subtitle">Cook County Cooks · shirt order fulfillment</div>
    </div>
    <div class="head-status">
      <span class="status-dot load" id="statusDot"></span>
      <span id="statusText">Loading…</span>
      <button class="refresh-btn" id="refreshBtn" type="button">↻ Refresh</button>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="cards" id="cards">
    <div class="metric pending"><div class="label">Pending</div><div class="value" id="mPending">—</div><div class="sub">awaiting shipment</div></div>
    <div class="metric"><div class="label">Shirts to ship</div><div class="value" id="mShirts">—</div><div class="sub">across pending orders</div></div>
    <div class="metric shipped"><div class="label">Shipped this month</div><div class="value" id="mShipped">—</div><div class="sub" id="mShippedSub">orders</div></div>
    <div class="metric"><div class="label">Oldest pending</div><div class="value" id="mOldest">—</div><div class="sub" id="mOldestSub">&nbsp;</div></div>
  </div>

  <div class="controls">
    <div class="segmented" id="filterSeg">
      <button data-filter="pending" class="active">Pending <span class="pill" id="pillPending">0</span></button>
      <button data-filter="shipped">Shipped <span class="pill" id="pillShipped">0</span></button>
      <button data-filter="all">All <span class="pill" id="pillAll">0</span></button>
    </div>
    <div class="search"><input type="text" id="search" placeholder="Search store name…" autocomplete="off" /></div>
  </div>

  <div id="orders" class="orders"></div>
  <div id="stateBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
 * CONFIGURATION
 * ============================================================ */
const CONFIG = {
  GITHUB_OWNER: "BlufoxMobile",
  GITHUB_REPO:  "Brinks-Logbook-Reporting",
  GITHUB_BRANCH:"main",
  ORDERS_DIR:   "data/uniform-orders",

  // Worker route that marks an order shipped (and fires the confirmation email).
  // If you deploy the uniform worker at a different URL, update this.
  SHIP_ENDPOINT: "https://brinks-pickup-orchestrator.jeff-bilbrey-jb.workers.dev/uniform-ship",

  // Optional: a GitHub token (read-only is fine) raises the API rate limit from
  // 60→5000 requests/hour. Leave blank for normal low-volume use.
  GITHUB_TOKEN: "",

  REFRESH_MS: 60000,
};
/* ============================================================ */

const $ = id => document.getElementById(id);
const CARRIERS = ["UPS", "FedEx", "USPS", "DHL", "Other"];

let ORDERS = [];
let filter = "pending";
let searchTerm = "";
let refreshTimer = null;

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function ghHeaders(){ const h={Accept:"application/vnd.github+json"}; if(CONFIG.GITHUB_TOKEN) h.Authorization="token "+CONFIG.GITHUB_TOKEN; return h; }
function fmtDate(iso){ if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return ""; return d.toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }
function fmtDay(iso){ if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return ""; return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
function daysAgo(iso){ if(!iso) return null; const d=new Date(iso); if(isNaN(d)) return null; return Math.floor((Date.now()-d.getTime())/86400000); }
function trackingUrl(carrier, tracking){
  const t=encodeURIComponent(String(tracking||"").trim());
  switch(String(carrier||"").toUpperCase()){
    case "UPS":   return `https://www.ups.com/track?loc=en_US&tracknum=${t}`;
    case "FEDEX": return `https://www.fedex.com/fedextrack/?trknbr=${t}`;
    case "USPS":  return `https://tools.usps.com/go/TrackConfirmAction?tLabels=${t}`;
    case "DHL":   return `https://www.dhl.com/us-en/home/tracking.html?tracking-id=${t}`;
    default:      return `https://parcelsapp.com/en/tracking/${t}`;
  }
}

function setStatus(kind, text){
  const dot=$("statusDot");
  dot.className="status-dot "+(kind==="ok"?"ok":kind==="err"?"err":"load");
  $("statusText").textContent=text;
}

let toastTimer=null;
function toast(kind,msg){
  const t=$("toast");
  t.className="toast show "+kind;
  t.textContent=msg;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),3500);
}

/* ---------- data load ---------- */
async function loadOrders(showSpinner){
  if(showSpinner){ $("stateBox").innerHTML='<div class="state"><div class="spinner"></div>Loading orders…</div>'; $("orders").innerHTML=""; }
  setStatus("load","Loading…");
  try{
    const listUrl=`https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/contents/${CONFIG.ORDERS_DIR}?ref=${encodeURIComponent(CONFIG.GITHUB_BRANCH)}&t=${Date.now()}`;
    const res=await fetch(listUrl,{headers:ghHeaders(),cache:"no-store"});
    if(res.status===404){ ORDERS=[]; render(); setStatus("ok","No orders yet"); return; }
    if(!res.ok) throw new Error("GitHub list "+res.status);
    const files=(await res.json()).filter(f=>f.type==="file"&&f.name.endsWith(".json"));
    const orders=await Promise.all(files.map(async f=>{
      try{ const r=await fetch(f.download_url+"?t="+Date.now(),{cache:"no-store"}); if(!r.ok) return null; const o=await r.json(); o._sha=f.sha; return o; }
      catch(e){ return null; }
    }));
    ORDERS=orders.filter(Boolean).sort((a,b)=> new Date(b.submittedAt||0)-new Date(a.submittedAt||0));
    render();
    setStatus("ok","Updated "+new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}));
  }catch(err){
    console.error(err);
    setStatus("err","Load failed");
    if(!ORDERS.length){
      const rate=String(err.message).includes("403");
      $("stateBox").innerHTML='<div class="state"><div class="big">⚠️</div>'+
        (rate?"GitHub API rate limit reached. Try again in a few minutes, or add a read-only token in CONFIG.":"Couldn’t load orders. Check your connection and refresh.")+'</div>';
    }
  }
}

/* ---------- metrics ---------- */
function updateMetrics(){
  const pending=ORDERS.filter(o=>o.status!=="shipped");
  const shipped=ORDERS.filter(o=>o.status==="shipped");
  const now=new Date();
  const shippedThisMonth=shipped.filter(o=>{ const d=new Date(o.shippedAt||o.submittedAt); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const shirts=pending.reduce((s,o)=>s+(Number(o.totalShirts)||0),0);
  let oldest=null;
  pending.forEach(o=>{ const da=daysAgo(o.submittedAt); if(da!=null&&(oldest==null||da>oldest)) oldest=da; });

  $("mPending").textContent=pending.length;
  $("mShirts").textContent=shirts;
  $("mShipped").textContent=shippedThisMonth.length;
  $("mOldest").textContent=(oldest==null?"—":(oldest===0?"Today":oldest+"d"));
  $("mOldestSub").textContent=(oldest==null?" ":(oldest===0?"newest still open":"since submitted"));

  $("pillPending").textContent=pending.length;
  $("pillShipped").textContent=shipped.length;
  $("pillAll").textContent=ORDERS.length;
}

/* ---------- render ---------- */
function render(){
  updateMetrics();
  const box=$("orders"), state=$("stateBox");
  let list=ORDERS.slice();
  if(filter==="pending") list=list.filter(o=>o.status!=="shipped");
  else if(filter==="shipped") list=list.filter(o=>o.status==="shipped");
  if(searchTerm){ const q=searchTerm.toLowerCase(); list=list.filter(o=>String(o.store||"").toLowerCase().includes(q)); }

  if(!ORDERS.length){ box.innerHTML=""; state.innerHTML='<div class="state"><div class="big">📦</div>No uniform orders yet. New orders from the order form will appear here automatically.</div>'; return; }
  if(!list.length){ box.innerHTML=""; const msg=filter==="pending"?'<div class="big">🎉</div>No pending orders — everything’s shipped!':searchTerm?"No orders match your search.":"Nothing here."; state.innerHTML='<div class="state">'+msg+'</div>'; return; }

  state.innerHTML="";
  box.innerHTML=list.map(orderCard).join("");
  wireCards();
}

function itemsTable(o){
  const rows=(o.items||[]).filter(it=>Number(it.qty)>0).map(it=>{
    const recips=(it.recipients||[]).filter(Boolean).map(esc).join(", ");
    return `<tr><td class="sz">${esc(it.size)}</td><td class="qty">${Number(it.qty)}</td><td class="rec">${recips||"—"}</td></tr>`;
  }).join("");
  if(!rows) return '<div class="ship-to">No items listed.</div>';
  return `<table class="items"><thead><tr><th>Size</th><th style="text-align:center">Qty</th><th>Recipients</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function orderCard(o){
  const shipped=o.status==="shipped";
  const addr=o.storeAddress?esc(o.storeAddress):'<span style="color:var(--text-faint);font-style:italic;">Store address on file</span>';
  let foot;
  if(shipped){
    const url=o.trackingNumber?trackingUrl(o.carrier,o.trackingNumber):"#";
    foot=`<div class="shipped-info">
        <div class="row"><span class="k">Carrier</span><span class="v">${esc(o.carrier||"—")}</span></div>
        <div class="row"><span class="k">Tracking #</span><span class="v" style="font-family:ui-monospace,Menlo,Consolas,monospace;">${esc(o.trackingNumber||"—")}</span></div>
        <div class="row"><span class="k">Shipped</span><span class="v">${esc(fmtDay(o.shippedAt))}${o.shippedBy?" · "+esc(o.shippedBy):""}</span></div>
        ${o.trackingNumber?`<a class="track-link" href="${esc(url)}" target="_blank" rel="noopener">🔎 Track shipment</a>`:""}
      </div>`;
  } else {
    const carrierOpts=CARRIERS.map(c=>`<option value="${c}">${c}</option>`).join("");
    foot=`<button class="ship-btn" data-act="open" data-id="${esc(o.id)}">📦 Mark Shipped</button>
      <div class="ship-form" id="sf-${esc(o.id)}">
        <div class="two">
          <div><label>Carrier</label><select data-role="carrier">${carrierOpts}</select></div>
          <div><label>Your name</label><input type="text" data-role="who" placeholder="Optional" /></div>
        </div>
        <div><label>Tracking Number</label><input type="text" data-role="tracking" placeholder="Enter tracking #" autocomplete="off" /></div>
        <div class="ship-err" data-role="err"></div>
        <div class="ship-actions">
          <button class="btn-cancel" data-act="cancel" data-id="${esc(o.id)}">Cancel</button>
          <button class="btn-confirm" data-act="confirm" data-id="${esc(o.id)}">Confirm Shipment</button>
        </div>
      </div>`;
  }
  return `<div class="order" data-id="${esc(o.id)}">
    <div class="order-head">
      <div>
        <div class="store">${esc(o.store||"—")}</div>
        <div class="date">Ordered ${esc(fmtDate(o.submittedAt))}</div>
      </div>
      <span class="badge ${shipped?"shipped":"pending"}">${shipped?"Shipped":"Pending"}</span>
    </div>
    <div class="order-body">
      <div><div class="field-label">Ship to</div><div class="ship-to">${addr}</div></div>
      <div><div class="field-label">Items</div>${itemsTable(o)}</div>
      <div class="total-row"><span>Total shirts</span><span class="n">${Number(o.totalShirts)||0}</span></div>
    </div>
    <div class="order-foot">${foot}</div>
  </div>`;
}

/* ---------- interactions ---------- */
function wireCards(){
  document.querySelectorAll("[data-act]").forEach(el=>{
    el.onclick=()=>handleAction(el.dataset.act, el.dataset.id, el);
  });
  // Restore remembered shipper name
  const who=localStorage.getItem("uniform_shipper_name")||"";
  if(who) document.querySelectorAll('input[data-role="who"]').forEach(i=>{ if(!i.value) i.value=who; });
}

function handleAction(act,id,el){
  const form=$("sf-"+id);
  const card=document.querySelector(`.order[data-id="${cssEsc(id)}"]`);
  if(act==="open"){
    el.style.display="none";
    form.classList.add("open");
    const inp=form.querySelector('input[data-role="tracking"]'); if(inp) inp.focus();
  } else if(act==="cancel"){
    form.classList.remove("open");
    const btn=card.querySelector('.ship-btn'); if(btn) btn.style.display="";
    form.querySelector('[data-role="err"]').classList.remove("show");
  } else if(act==="confirm"){
    confirmShip(id,form,el);
  }
}

function cssEsc(s){ return String(s).replace(/["\\]/g,"\\$&"); }

async function confirmShip(id,form,btn){
  const carrier=form.querySelector('[data-role="carrier"]').value;
  const tracking=form.querySelector('[data-role="tracking"]').value.trim();
  const who=form.querySelector('[data-role="who"]').value.trim();
  const errEl=form.querySelector('[data-role="err"]');
  errEl.classList.remove("show");

  if(!tracking){ errEl.textContent="Enter a tracking number to confirm shipment."; errEl.classList.add("show"); return; }
  if(who) localStorage.setItem("uniform_shipper_name",who);

  btn.disabled=true; btn.textContent="Sending…";
  try{
    const res=await fetch(CONFIG.SHIP_ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=UTF-8"},
      body:JSON.stringify({ id, trackingNumber:tracking, carrier, shippedBy:who })
    });
    let result=null; try{ result=await res.json(); }catch{}
    if(!res.ok || !result || result.ok!==true){
      throw new Error((result&&result.error)||("HTTP "+res.status));
    }
    // Update local model & re-render
    const o=ORDERS.find(x=>x.id===id);
    if(o){ Object.assign(o, result.order||{}, {status:"shipped",trackingNumber:tracking,carrier,shippedBy:who||null,shippedAt:(result.order&&result.order.shippedAt)||new Date().toISOString()}); }
    toast("success","Marked shipped — confirmation email sent.");
    render();
  }catch(err){
    console.error(err);
    errEl.textContent="Couldn’t save: "+err.message+". Please try again.";
    errEl.classList.add("show");
    btn.disabled=false; btn.textContent="Confirm Shipment";
  }
}

/* ---------- wiring ---------- */
$("filterSeg").addEventListener("click",e=>{
  const b=e.target.closest("button[data-filter]"); if(!b) return;
  filter=b.dataset.filter;
  $("filterSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("active",x===b));
  render();
});
$("search").addEventListener("input",e=>{ searchTerm=e.target.value; render(); });
$("refreshBtn").addEventListener("click",()=>loadOrders(true));

function startAutoRefresh(){ clearInterval(refreshTimer); refreshTimer=setInterval(()=>loadOrders(false),CONFIG.REFRESH_MS); }
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) loadOrders(false); });

/* ---------- init ---------- */
loadOrders(true);
startAutoRefresh();
</script>
